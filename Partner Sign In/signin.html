<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZettaBiller Partner Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS -->
  <link rel="stylesheet" href="signin.css" />
</head>

<body>

  <div class="login-wrapper">

    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="brand-icon">🤝</div>
        <h1>PARTNER ACCESS</h1>
        <p>Continue to your ZettaBiller workspace</p>
      </div>

      <!-- Illustration placeholder -->
      <div class="illustration-box">
        <!-- you can put an image later -->
        <!-- <img src="partner-illustration.png" alt=""> -->
      </div>

      <!-- Workspace -->
      <div class="form-group">
        <label>Company Workspace</label>

        <div class="workspace-row">
          <input
            type="text"
            id="workspaceInput"
            placeholder="yourcompany"
            autocomplete="off"
          />
          <span class="workspace-suffix">.zettabiller.com</span>
        </div>
      </div>

      <!-- Continue -->
      <button id="continueBtn" class="continue-btn">
        Continue to Workspace
      </button>

      <!-- Hint -->
      <div class="login-hint">
        Or open directly:
        <strong>yourcompany.zettabiller.com</strong>
      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="signin.js"></script>
</body>
</html>
